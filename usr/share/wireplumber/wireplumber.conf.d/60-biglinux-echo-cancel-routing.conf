# BigLinux Microphone
#
# Load the policy hook that keeps `echo-cancel-capture` connected to the
# current physical microphone instead of to our own smart-filter source.

wireplumber.profiles = {
  main = {
    hooks.biglinux.echo-cancel-routing = required
  }
}

wireplumber.components = [
  {
    name = biglinux/echo-cancel-routing.lua, type = script/lua
    provides = hooks.biglinux.echo-cancel-routing
    requires = [ metadata.default, metadata.filters ]
  }
]
