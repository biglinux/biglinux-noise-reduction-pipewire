# BigLinux Microphone — adaptive USB jitter mitigation.
#
# USB audio is "batch" hardware: the driver delivers samples in bursts
# tied to USB SOF intervals (~1 ms on USB 2.0 Full-Speed, fractional on
# High-Speed isochronous). Without extra slack the PipeWire data loop
# misses the next USB transfer often enough to drop frames during
# voice/video calls — the dropouts correlate with peaks in remote
# audio because the call client adds CPU pressure exactly when samples
# need to flow.
#
# Per the upstream PipeWire docs (see
# https://docs.pipewire.org/page_man_pipewire-alsa_5.html and
# https://wiki.archlinux.org/title/PipeWire#xruns), `api.alsa.headroom`
# adds an internal buffer between hardware and software pointers. It
# absorbs USB jitter without forcing a global quantum / rate (forcing
# those breaks pro-audio interfaces, Bluetooth headsets and any device
# that negotiated something other than 1024/48000).
#
# We apply this to USB audio devices only — the package's primary use
# case is voice calls on consumer USB mics / webcams, where +21 ms of
# capture latency is unnoticeable and the xrun mitigation is critical.
# Built-in HDA, Bluetooth and pro-audio interfaces match nothing here
# and stay on their negotiated defaults.

monitor.alsa.rules = [
  {
    matches = [
      # USB capture (mics, USB webcams with audio, USB-C headsets).
      { node.name = "~alsa_input.usb-.*" }
      # USB playback (USB DACs, headsets, conference speakers).
      { node.name = "~alsa_output.usb-.*" }
    ]
    actions = {
      update-props = {
        # ~21 ms of slack at 48 kHz. Enough to absorb a missed USB
        # frame without retraining the USB endpoint. The driver still
        # negotiates its preferred period-size; we only widen the
        # ring-buffer cushion.
        api.alsa.headroom = 1024
      }
    }
  }
]
