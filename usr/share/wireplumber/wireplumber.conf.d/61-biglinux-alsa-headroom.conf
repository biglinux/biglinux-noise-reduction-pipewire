# BigLinux Microphone — broaden ALSA ring-buffer headroom to absorb
# scheduling jitter introduced by cross-process filter chains.
#
# Why this exists. The denoiser ships two PipeWire filter chains:
#
#   1. mic side  — runs in the system `filter-chain.service` daemon.
#   2. output side — runs in the standalone
#      `biglinux-microphone-output.service` daemon (separate process
#      because the GTCRN LADSPA plugin keeps a per-process ONNX
#      Runtime singleton, so mic and output cannot share one
#      filter-chain process).
#
# Both chains connect to the main PipeWire daemon's ALSA nodes over
# the protocol-native socket. That cross-process hop adds a
# kernel-scheduling round-trip on every quantum, and any time the
# hosting daemon is preempted (browser repaints, calls under load,
# kernel wakeups elsewhere) the alsa hw substream runs the ring
# buffer empty and PipeWire emits the
# `spa.alsa: front:1p: follower avail:N delay:N target:T thr:T,
# resync` log line — that log line is exactly the audible "small
# cuts" symptom users report on the playback path during calls.
#
# Per the upstream PipeWire docs (pipewire-alsa(5),
# wiki.archlinux.org/title/PipeWire#xruns), `api.alsa.headroom`
# enlarges the slack between the hardware pointer and the software
# pointer without changing the negotiated period-size or the global
# quantum. Larger headroom = more slack to absorb a late delivery
# before the kernel decides to resync, at the cost of a fixed
# capture/playback latency increase.
#
# What we match. Every consumer-class ALSA device the package can
# realistically drive:
#
#   - USB capture / playback — batch hardware, USB SOF jitter alone
#     can starve the buffer even without our filter chain in the
#     graph.
#   - PCI/HDA built-in capture / playback — most laptops and
#     desktops; this is the path most users hit when they enable the
#     "listen with denoise" output filter and start a call.
#   - Bluetooth A2DP / HSP playback — already high-latency, +21 ms
#     is imperceptible and absorbs scheduling gaps in the BT stack.
#
# What we do not match. Pro-audio interfaces want sub-5 ms
# round-trip and would be ill-served by 21 ms of forced headroom.
# A competing WirePlumber rule with higher `priority.session` (or a
# user node-prop override) can lower headroom on a per-device
# basis. The package targets consumer voice / video calls on stock
# hardware, where this trade-off is overwhelmingly favourable.

monitor.alsa.rules = [
  {
    matches = [
      # USB audio (mics, headsets, webcams, USB DACs).
      { node.name = "~alsa_input.usb-.*" }
      { node.name = "~alsa_output.usb-.*" }
      # Built-in HDA / PCI (laptop speakers, motherboard analog).
      { node.name = "~alsa_input.pci-.*" }
      { node.name = "~alsa_output.pci-.*" }
      # Bluetooth (A2DP playback, HSP/HFP capture+playback).
      { node.name = "~bluez_input.*" }
      { node.name = "~bluez_output.*" }
    ]
    actions = {
      update-props = {
        # ~42 ms of slack at 48 kHz. Sized for the cross-process
        # filter-chain pipeline: even with `node.async = true` on
        # the output filter (so PipeWire inserts an adaptive
        # resampler between the standalone daemon and the hw sink),
        # bursts of preemption during heavy multi-stream playback
        # can drain the hw ring before the resampler catches up.
        # 2048 frames empirically eliminates the residual
        # `front:1p ... resync` log spam under 4+ Chrome streams +
        # an active call on PCI/HDA hardware. The fixed +42 ms is
        # invisible for voice/video calls (the package's primary
        # use case); pro-audio users override via a
        # higher-priority WirePlumber rule.
        api.alsa.headroom = 2048
      }
    }
  }
]
