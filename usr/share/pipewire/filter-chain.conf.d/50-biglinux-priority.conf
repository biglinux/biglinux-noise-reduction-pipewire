# BigLinux Microphone — raise filter-chain RT priority to match the
# main PipeWire daemon.
#
# Upstream `/usr/share/pipewire/filter-chain.conf` declares
# `libpipewire-module-rt` with all args commented out, so the data-loop
# thread runs at the module default (rt.prio=83, nice=0). Meanwhile the
# main session daemon (`/usr/share/pipewire/pipewire.conf`) overrides
# the module to rt.prio=88 / nice.level=-11 — meaning a busy main
# daemon can preempt the filter-chain instance that hosts our GTCRN /
# DeepFilterNet3 LADSPA node, causing audible dropouts under load.
#
# Re-declaring the module here makes PipeWire load it a second time
# with our args; the later load wins for thread scheduling. `nofail` +
# `ifexists` keep the system bootable on builds that lack the module.
#
# This drop-in lives under `/usr/share/pipewire/` so it applies to
# every filter-chain instance the user spawns (biglinux mic chain,
# biglinux echo-cancel, and any third-party filter graph). Equal
# scheduling weight is the desired outcome — we never want our chain
# to be the lowest-priority audio path on the box.
context.modules = [
    { name = libpipewire-module-rt
        args = {
            nice.level    = -11
            rt.prio       = 88
            rt.time.soft  = -1
            rt.time.hard  = -1
        }
        flags = [ ifexists nofail ]
    }
]
