# BigLinux Microphone — pin negotiated quantum / rate.
#
# Without this drop-in, PipeWire lets each node negotiate its own
# quantum (e.g. USB capture cards default to 256 frames while the
# GTCRN/DFN3 LADSPA chain runs at 1024). The mismatch produces
# accumulating buffer slip during voice/video calls — measured ~70
# dropped frames/s on the capture driver, audible as crackle that
# correlates with remote talk activity (call client load triggers
# re-negotiation pressure).
#
# Forcing the negotiated quantum to 1024 @ 48 kHz aligns every node
# in the graph with the LADSPA buffer size and brought capture
# drops down to ~0.3/s on the same hardware (210× reduction).
#
# Trade-off: applications that benefit from sub-21 ms quantum
# (live music monitoring, low-latency JACK production) will see
# higher latency. Acceptable for this package's primary use case
# (voice calls, podcast capture). Power users wanting smaller
# quantum can override these by removing this file or shadowing it
# in `~/.config/pipewire/pipewire.conf.d/`.

context.properties = {
    default.clock.rate          = 48000
    default.clock.force-rate    = 48000
    default.clock.force-quantum = 1024
}
