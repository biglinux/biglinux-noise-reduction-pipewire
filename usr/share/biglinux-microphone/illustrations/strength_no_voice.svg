<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
  <!-- Mute / no-voice indicator at top -->
  <g transform="translate(8,6)">
    <circle cx="6" cy="6" r="5.5" fill="none" stroke="#999" stroke-width="1"/>
    <line x1="2.5" y1="2.5" x2="9.5" y2="9.5" stroke="#999" stroke-width="1.2"/>
    <text x="18" y="9" font-family="sans-serif" font-size="5" fill="#999">no voice detected</text>
  </g>
  <!-- Noisy input (left) -->
  <path d="M5,42 L8,38 L11,46 L14,34 L17,48 L20,32 L23,44 L26,36 L29,46 L32,34 L35,42 L38,38"
        stroke="#999" stroke-width="1.5" fill="none"/>
  <path d="M5,42 L7,40 L9,44 L11,38 L13,46 L15,35 L18,47 L20,36 L23,44 L25,32 L28,46 L31,35 L34,42 L37,38 L40,40"
        stroke="#e8e8e8" stroke-width="2.5" fill="none" opacity="0.6"/>
  <!-- Arrow with strength label -->
  <line x1="46" y1="42" x2="60" y2="42" stroke="#3584e4" stroke-width="1.5"/>
  <polygon points="60,38 67,42 60,46" fill="#3584e4"/>
  <text x="53" y="36" font-family="sans-serif" font-size="4.5" fill="#3584e4" text-anchor="middle">Strength</text>
  <!-- Silent line (right) -->
  <line x1="72" y1="42" x2="108" y2="42" stroke="#3584e4" stroke-width="2"/>
  <!-- Labels -->
  <text x="22" y="62" font-family="sans-serif" font-size="5" fill="#999" text-anchor="middle">Background noise</text>
  <text x="90" y="62" font-family="sans-serif" font-size="5" fill="#3584e4" text-anchor="middle">Silenced</text>
  <text x="60" y="76" font-family="sans-serif" font-size="5.5" fill="#999" text-anchor="middle">Filter strength when nobody is speaking</text>
</svg>
