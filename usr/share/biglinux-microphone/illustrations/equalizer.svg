<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
  <!-- Baseline -->
  <line x1="8" y1="42" x2="112" y2="42" stroke="#999" stroke-width="0.5" stroke-dasharray="2,2"/>
  <!-- 10 vertical band sliders -->
  <g stroke="#999" stroke-width="1" fill="none">
    <line x1="14" y1="14" x2="14" y2="58"/>
    <line x1="24" y1="14" x2="24" y2="58"/>
    <line x1="34" y1="14" x2="34" y2="58"/>
    <line x1="44" y1="14" x2="44" y2="58"/>
    <line x1="54" y1="14" x2="54" y2="58"/>
    <line x1="64" y1="14" x2="64" y2="58"/>
    <line x1="74" y1="14" x2="74" y2="58"/>
    <line x1="84" y1="14" x2="84" y2="58"/>
    <line x1="94" y1="14" x2="94" y2="58"/>
    <line x1="104" y1="14" x2="104" y2="58"/>
  </g>
  <!-- Slider knobs forming a smile-shape voice curve -->
  <g fill="#3584e4">
    <rect x="11" y="46" width="6" height="4" rx="1"/>
    <rect x="21" y="40" width="6" height="4" rx="1"/>
    <rect x="31" y="34" width="6" height="4" rx="1"/>
    <rect x="41" y="28" width="6" height="4" rx="1"/>
    <rect x="51" y="22" width="6" height="4" rx="1"/>
    <rect x="61" y="20" width="6" height="4" rx="1"/>
    <rect x="71" y="22" width="6" height="4" rx="1"/>
    <rect x="81" y="28" width="6" height="4" rx="1"/>
    <rect x="91" y="36" width="6" height="4" rx="1"/>
    <rect x="101" y="44" width="6" height="4" rx="1"/>
  </g>
  <!-- Smooth response curve through the knobs -->
  <path d="M14,48 Q34,32 60,22 Q86,30 104,46"
        stroke="#3584e4" stroke-width="1.5" fill="none" opacity="0.5"/>
  <text x="60" y="74" font-family="sans-serif" font-size="5.5" fill="#999" text-anchor="middle">10-band parametric equalizer</text>
</svg>
