name: Security

on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - ".github/workflows/security.yml"
      - ".github/actions/install-system-deps/**"
  pull_request:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
  schedule:
    # Daily — picks up new RustSec advisories without waiting for a PR.
    - cron: '30 5 * * *'

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: cargo-audit (RustSec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # TruffleHog scans the diff (PR) or full history (push/cron) for
  # leaked secrets. It's the free OSS replacement for gitleaks-action,
  # which started requiring a paid license in v2.
  secrets:
    name: trufflehog (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown

  miri:
    name: Miri (UB detection on safe code)
    runs-on: ubuntu-latest
    container: archlinux:latest
    timeout-minutes: 30
    steps:
      - run: pacman -Sy --noconfirm --needed git
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install-system-deps
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - name: Run Miri on pure-logic config tests
        env:
          MIRIFLAGS: -Zmiri-disable-isolation
        # Filter quoted to avoid YAML parsing the trailing `::` as a
        # mapping value separator.
        run: "cargo +nightly miri test --lib config::"
