name: CI

on:
  push:
    branches:
      - main
      - "**stable**"
      - "**testing**"
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "po/**.po"
      - "po/**.pot"
      - ".github/dependabot.yml"
      - ".github/workflows/codeql.yml"
      - ".github/workflows/security.yml"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "po/**.po"
      - "po/**.pot"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  CARGO_INCREMENTAL: "0"

permissions:
  contents: read

# One run per ref. Pushing a fixup cancels the previous run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Compile jobs run inside Arch container because Cargo.toml gates
  #    GTK 4.20 (`features = ["v4_20"]`) and ubuntu-latest only ships
  #    GTK 4.14. Arch is also our deployment target (BigLinux/Manjaro)
  #    so CI matches what users will run.
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy (strict)
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - run: pacman -Sy --noconfirm --needed git
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install-system-deps
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: tests (nextest)
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - run: pacman -Sy --noconfirm --needed git
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install-system-deps
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: cargo nextest run --all-features --locked

  msrv:
    name: MSRV (1.82)
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - run: pacman -Sy --noconfirm --needed git
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install-system-deps
      # Pinning toolchain via `with:` so Dependabot can't bump our MSRV
      # by changing the action ref.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.82.0"
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --all-features --locked

  release-build:
    name: release build
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - run: pacman -Sy --noconfirm --needed git
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install-system-deps
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --locked

  deny:
    name: cargo-deny (advisories + licenses + bans)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check

  machete:
    name: cargo-machete (unused deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - run: cargo machete

  typos:
    name: typos (spellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@master

  complexity:
    name: lizard (CCN <= 25) + jscpd (duplication)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install lizard
        run: pipx install lizard
      - name: Install jscpd
        run: npm install -g jscpd
      - name: Cyclomatic complexity
        run: lizard src/ -l rust -C 25 -w
      - name: Duplicate-code detector
        run: jscpd --min-lines 50 --min-tokens 100 --threshold 5 --reporters console --silent src/

  i18n:
    name: gettext catalogs (msgfmt -c)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install gettext
        run: sudo apt-get update && sudo apt-get install -y gettext
      - name: Validate every .po
        run: |
          fail=0
          for po in po/*.po; do
            if ! msgfmt -c -o /dev/null "$po" 2>&1; then
              echo "::error file=$po::invalid catalog"
              fail=1
            fi
          done
          exit "$fail"

  flatpak-manifest:
    name: flatpak manifest lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: YAML parse
        run: python3 -c "import yaml; yaml.safe_load(open('packaging/flatpak/br.com.biglinux.microphone.yml'))"

  shell:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        env:
          SHELLCHECK_OPTS: -e SC2034,SC2154
        with:
          scandir: ./scripts
          additional_files: |
            packaging/flatpak/generate-cargo-sources.sh

  # PR-only — flags new dependencies introduced by the PR that have
  # known advisories. Complements cargo-audit (which scans current
  # state) by gating before merge.
  dependency-review:
    name: dependency-review (PR only)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
