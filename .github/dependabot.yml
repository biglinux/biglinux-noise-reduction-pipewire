version: 2

updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 10
    # Group minor + patch bumps to one PR per ecosystem so the queue
    # stays small. Major bumps still arrive as individual PRs.
    groups:
      cargo-minor-patch:
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - rust
    commit-message:
      prefix: cargo

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Sao_Paulo
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
    # Ignore bumps to dtolnay/rust-toolchain — its tagged versions are
    # Rust toolchain identifiers, not action versions. Workflows pass
    # the toolchain via `with: toolchain:` so the action ref stays at
    # `@master`/`@stable` and Dependabot has nothing to bump.
    ignore:
      - dependency-name: dtolnay/rust-toolchain
