name: Install system dependencies
description: |
  Installs the GTK4 / libadwaita / PipeWire build stack for compiling
  this crate. Designed for the `archlinux:latest` container that the
  compile jobs run in — the project's GTK feature gate (`v4_20`) needs
  GTK ≥ 4.20, which is not available on `ubuntu-latest` runners.

runs:
  using: composite
  steps:
    - name: Sync pacman + install build deps
      shell: bash
      run: |
        set -euo pipefail
        pacman -Sy --noconfirm
        pacman -S --needed --noconfirm \
          base-devel \
          git \
          pkgconf \
          clang \
          glib2 \
          gtk4 \
          libadwaita \
          pipewire \
          cairo \
          pango \
          gdk-pixbuf2 \
          graphene \
          gettext
